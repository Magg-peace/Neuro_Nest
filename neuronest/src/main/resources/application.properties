spring.application.name=neuronest

# Database Configuration
# Default to H2 for easy deployment, but allow MySQL via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:neuronest_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}

# Server Port
server.port=${PORT:8080}
