spring.application.name=neuronest

# Database Configuration
# Database Configuration - MySQL ONLY
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/neuronest_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Meghu*2023*}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=${PORT}
server.address=0.0.0.0